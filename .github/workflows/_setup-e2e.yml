name: Setup E2E Environment

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      justfile_recipe:
        required: true
        type: string
      justfile_args:
        required: false
        type: string
        default: ""
      justfile_env:
        required: false
        type: string
        default: ""
      cache_key:
        required: false
        type: string
        default: "stable-release"
env:
  CACHE_SHARED_KEY: stable-release
  CACHE_PATH: |
    ~/.cargo/registry/index/
    ~/.cargo/registry/cache/
    ~/.cargo/git/db/
    target/

jobs:
  setup_and_test:
    name: Setup and Run E2E
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88
      - name: Rust Cache - Restore shared key
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.CACHE_PATH }}
          restore-keys: ${{ env.CACHE_SHARED_KEY }}
          key: ${{ env.CACHE_SHARED_KEY }}
      - name: Install libsasl2-dev libssl-dev
        run: sudo apt-get update && sudo apt install -y build-essential pkg-config libssl-dev libsasl2-dev
      - name: Set up Just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2.0.0
      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
      - name: Install npm
        run: npm install -g npm@10.8.2
      - name: Install docker-compose
        run: sudo apt-get install docker-compose -y
      - name: Install jq
        run: sudo apt-get install jq -y
      - name: Install cargo tools
        # run: cargo install killport@1.1.0 wait-service@0.3.1
        run: |
          cargo install killport
          cargo install wait-service
      - name: Install Python 3.12
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -
      - name: Run e2e tests
        run: ${{ inputs.justfile_env }} just run-test ${{ inputs.justfile_recipe }} ${{ inputs.justfile_args }}
        env:
          CARGO_PROFILE_RELEASE_DEBUG: 0
          RUST_LOG: error
          RELEASE: 0
          RUST_BACKTRACE: 1
