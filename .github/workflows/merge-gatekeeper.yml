name: Merge Gatekeeper

on:
  pull_request:
    branches:
      - "*"

jobs:
  merge-gatekeeper:
    runs-on: ubuntu-22.04
    name: Merge Gatekeeper
    permissions:
      checks: read
      statuses: read
    steps:
      - name: Run Merge Gatekeeper
        uses: upsidr/merge-gatekeeper@09af7a82c1666d0e64d2bd8c01797a0bcfd3bb5d # v1.2.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          self: Merge Gatekeeper
          interval: 5
          timeout: 1800
          ignored: PR Agent
